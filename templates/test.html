<!DOCTYPE html>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>照片牆</title>
	<style type="text/css">
		header, footer, nav {
			text-align: center;
			padding: 10pX;
			margin: 10pX;
		}
		header {
			background-image: url("/static/po.jpg");
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		
		*{
			margin: 0;
			padding: 0;
			list-style: none;
			font-family: 'Noto Sans TC', sans-serif;
		}

		.box {
			width: 100%;
			display: flex;
		}

		.item {
			width: 25%;
			position: relative;
		}

		.item img {
			width: 100%;
			vertical-align: middle;
		}
		.item .text {
			position: absolute;
			top: 0;
			bottom: 0;
			right: 0;
			left: 0;
			padding: 20px;
			background-color: rgba(250, 112, 154, 0.8);
			display: flex;
			justify-content: center;
			flex-direction: column;
			opacity: 0;
			transition: opacity .5s ;
		}
		.item:hover .text {
			opacity: 1;
		}
		.item h2 {
			font-size: 40px;
			color: #ff0;
			font-weight: 500;
		}
	</style>
</head>
